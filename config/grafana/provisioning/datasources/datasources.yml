# ============================================================
# Grafana 数据源自动配置（Provisioning）
# 启动时自动注册 Prometheus、Loki、Alertmanager 数据源
# ============================================================

apiVersion: 1

datasources:
  # Prometheus - 指标查询
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  # Loki - 日志查询
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false

  # Alertmanager - 告警状态查询
  - name: Alertmanager
    type: alertmanager
    access: proxy
    url: http://alertmanager:9093
    editable: false
    jsonData:
      implementation: prometheus
