# ============================================================
# Prometheus 主配置文件
# 文档：https://prometheus.io/docs/prometheus/latest/configuration/configuration/
# ============================================================

global:
  # 指标抓取间隔（默认 15 秒）
  scrape_interval: 30s
  # 告警规则评估间隔（默认 15 秒）
  evaluation_interval: 30s

# ------------------------------------------------------------
# 告警管理器配置
# ------------------------------------------------------------
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

# ------------------------------------------------------------
# 告警规则文件
# ------------------------------------------------------------
rule_files:
  - "/etc/prometheus/rules/*.yml"

# ------------------------------------------------------------
# 抓取目标配置
# ------------------------------------------------------------
scrape_configs:

  # Prometheus 自身指标
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Node Exporter - 宿主机系统指标
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          host: "master"

  # cAdvisor - 容器资源指标
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          host: "master"

  # Pushgateway - 短生命周期任务推送指标
  # honor_labels: true 保留推送方设置的标签，避免被 Prometheus 覆盖
  - job_name: "pushgateway"
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]

  # Uptime Kuma - 服务可用性监控指标
  - job_name: "uptime-kuma"
    scrape_interval: 30s
    scheme: http
    metrics_path: '/metrics'
    basic_auth:
      username: 'admin'
      password: 'uptime123'
    static_configs:
      - targets: ['uptime-kuma:3001']

  # ----------------------------------------------------------
  # 可选抓取目标（取消注释以启用）
  # ----------------------------------------------------------

  # Docker Engine Metrics - Docker 守护进程指标
  # 需先在宿主机 /etc/docker/daemon.json 中配置：
  #   { "metrics-addr": "127.0.0.1:9323" }
  # 然后重启 Docker 守护进程
  # - job_name: "docker-engine"
  #   static_configs:
  #     - targets: ["host.docker.internal:9323"]
