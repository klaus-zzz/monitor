# ============================================================
# Prometheus 告警规则配置
# 包含：主机级、容器级、服务可用性、Uptime Kuma、Prometheus 自身告警
# 每条规则均配置 severity 标签和中文注解
# ============================================================

groups:

  # ==========================================================
  # 主机级告警规则
  # ==========================================================
  - name: 主机告警
    rules:

      # CPU 使用率超过 80% 持续 5 分钟
      - alert: 主机CPU使用率过高
        expr: 100 - (avg by(instance, host) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "主机 CPU 使用率过高 ({{ $labels.host }})"
          description: "主机 {{ $labels.host }}({{ $labels.instance }}) 的 CPU 使用率已超过 80%，当前值为 {{ $value | printf \"%.1f\" }}%，持续超过 5 分钟。"

      # 内存使用率超过 85% 持续 5 分钟
      - alert: 主机内存使用率过高
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "主机内存使用率过高 ({{ $labels.host }})"
          description: "主机 {{ $labels.host }}({{ $labels.instance }}) 的内存使用率已超过 85%，当前值为 {{ $value | printf \"%.1f\" }}%，持续超过 5 分钟。"

      # 磁盘使用率超过 85%
      # 排除 size 为 0 的文件系统，避免除以 0
      - alert: 主机磁盘使用率过高
        expr: |
          (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) * 100 > 85
          and node_filesystem_size_bytes{fstype!~"tmpfs|overlay"} > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "主机磁盘使用率过高 ({{ $labels.host }})"
          description: "主机 {{ $labels.host }}({{ $labels.instance }}) 的磁盘挂载点 {{ $labels.mountpoint }} 使用率已超过 85%，当前值为 {{ $value | printf \"%.1f\" }}%。"

      # 磁盘 IO 过高（IO 等待时间超过 30%）
      - alert: 主机磁盘IO过高
        expr: rate(node_disk_io_time_seconds_total[5m]) * 100 > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "主机磁盘 IO 过高 ({{ $labels.host }})"
          description: "主机 {{ $labels.host }}({{ $labels.instance }}) 的磁盘 {{ $labels.device }} IO 利用率过高，当前值为 {{ $value | printf \"%.1f\" }}%，持续超过 5 分钟。"

  # ==========================================================
  # 容器级告警规则
  # ==========================================================
  - name: 容器告警
    rules:

      # 容器在 10 分钟内重启次数异常（>3 次）
      # 通过 changes() 检测 container_start_time_seconds 的变化次数来判断重启
      - alert: 容器频繁重启
        expr: changes(container_start_time_seconds{name!=""}[10m]) > 3
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "容器频繁重启 (容器: {{ $labels.name }})"
          description: "容器 {{ $labels.name }} 在过去 10 分钟内重启了 {{ $value }} 次，请检查容器日志排查原因。"

      # 容器 CPU 使用率过高（单容器使用超过 1 核 CPU 持续 5 分钟）
      # rate 返回值单位为"核"，1.0 = 1 核跑满
      - alert: 容器CPU使用率过高
        expr: sum by(name) (rate(container_cpu_usage_seconds_total{name!=""}[5m])) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "容器 CPU 使用率过高 (容器: {{ $labels.name }})"
          description: "容器 {{ $labels.name }} 的 CPU 使用率已超过 0.8 核，当前值为 {{ $value | printf \"%.2f\" }} 核，持续超过 5 分钟。"

      # 容器内存使用率过高（超过限制的 85%）
      # 仅对设置了内存 limit 的容器生效（limit > 0），未设置 limit 的容器不触发
      - alert: 容器内存使用率过高
        expr: |
          (container_memory_usage_bytes{name!=""} / container_spec_memory_limit_bytes{name!=""}) * 100 > 85
          and container_spec_memory_limit_bytes{name!=""} > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "容器内存使用率过高 (容器: {{ $labels.name }})"
          description: "容器 {{ $labels.name }} 的内存使用率已超过限制的 85%，当前值为 {{ $value | printf \"%.1f\" }}%，持续超过 5 分钟。"

  # ==========================================================
  # 服务可用性告警规则
  # ==========================================================
  - name: 可用性告警
    rules:

      # 监控目标 down 超过 1 分钟
      - alert: 监控目标不可达
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "监控目标不可达 ({{ $labels.host | default $labels.instance }})"
          description: "Prometheus 抓取目标 {{ $labels.job }}/{{ $labels.instance }}{{ if $labels.host }}({{ $labels.host }}){{ end }} 已不可达，持续超过 1 分钟。请检查目标服务是否正常运行。"

  # ==========================================================
  # Uptime Kuma 告警规则
  # ==========================================================
  - name: Uptime Kuma 告警
    rules:

      # Uptime Kuma 中配置的监控目标异常（状态为 down）
      - alert: Uptime Kuma监控目标异常
        expr: monitor_status == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Uptime Kuma 监控目标异常 ({{ $labels.monitor_name }})"
          description: "Uptime Kuma 中的监控项「{{ $labels.monitor_name }}」({{ $labels.monitor_url }}) 已处于异常状态，持续超过 1 分钟。请检查目标服务是否正常运行。"

      # Uptime Kuma 中配置的监控目标响应过慢（超过 5 秒）
      - alert: Uptime Kuma监控目标响应过慢
        expr: monitor_response_time > 5000
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Uptime Kuma 监控目标响应过慢 ({{ $labels.monitor_name }})"
          description: "Uptime Kuma 中的监控项「{{ $labels.monitor_name }}」响应时间超过 5 秒，当前值为 {{ $value | printf \"%.0f\" }}ms，持续超过 3 分钟。"

      # SSL 证书即将过期（剩余不足 14 天）
      - alert: SSL证书即将过期
        expr: monitor_cert_days_remaining > 0 and monitor_cert_days_remaining < 14
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "SSL 证书即将过期 ({{ $labels.monitor_name }})"
          description: "Uptime Kuma 中的监控项「{{ $labels.monitor_name }}」的 SSL 证书将在 {{ $value | printf \"%.0f\" }} 天后过期，请尽快续期。"

  # ==========================================================
  # Prometheus 自身告警规则
  # ==========================================================
  - name: Prometheus 自身告警
    rules:

      # Prometheus 配置重载失败
      - alert: Prometheus配置重载失败
        expr: prometheus_config_last_reload_successful == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus 配置重载失败"
          description: "Prometheus 最近一次配置重载失败，请检查配置文件语法是否正确。"

      # Prometheus TSDB 压缩失败
      - alert: Prometheus TSDB压缩失败
        expr: increase(prometheus_tsdb_compactions_failed_total[1h]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus TSDB 压缩失败"
          description: "Prometheus TSDB 在过去 1 小时内出现压缩失败，失败次数增加了 {{ $value }} 次。这可能影响查询性能和存储效率。"

      # Prometheus 告警规则评估失败
      - alert: Prometheus告警规则评估失败
        expr: increase(prometheus_rule_evaluation_failures_total[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus 告警规则评估失败"
          description: "Prometheus 在过去 5 分钟内出现规则评估失败，失败次数增加了 {{ $value }} 次。请检查告警规则配置是否正确。"
