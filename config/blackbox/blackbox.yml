# ============================================================
# Blackbox Exporter 配置文件
# 支持 HTTP/TCP/ICMP 三种探测模块
# ============================================================

modules:
  # HTTP GET 探测：验证返回状态码为 2xx
  http_2xx:
    prober: http
    timeout: 10s
    http:
      method: GET
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: []  # 默认 2xx
      follow_redirects: true
      preferred_ip_protocol: ip4

  # TCP 连接探测
  tcp_connect:
    prober: tcp
    timeout: 10s

  # ICMP Ping 探测
  icmp:
    prober: icmp
    timeout: 10s
    icmp:
      preferred_ip_protocol: ip4
