# ============================================================
# Alertmanager 配置文件
# 负责告警去重、分组、路由和通知转发
# 所有告警通过 webhook-bridge 转发至飞书
# ============================================================

global:
  resolve_timeout: 5m

# 告警路由配置
route:
  group_by: ['instance', 'severity', 'alertname']
  group_wait: 15s
  group_interval: 5m
  repeat_interval: 24h
  receiver: 'feishu-webhook'
  routes:
    # 静默 info/none 级别告警
    - match:
        severity: 'info'
      receiver: 'null'
    - match:
        severity: 'none'
      receiver: 'null'

# 接收器配置
receivers:
  # 静默接收器
  - name: 'null'
  # 飞书告警接收器 - 通过 webhook-bridge 转发
  - name: 'feishu-webhook'
    webhook_configs:
      - url: 'http://webhook-bridge:5000/webhook'
        send_resolved: true

# 告警抑制规则
# critical 级别告警抑制同源的 warning 级别告警
inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ['alertname', 'instance']
