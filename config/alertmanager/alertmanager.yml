# ============================================================
# Alertmanager 配置文件
# 负责告警去重、分组、路由和通知转发
# 所有告警统一使用 prometheus-fs 模板通过飞书发送
# ============================================================

global:
  resolve_timeout: 5m

# 告警路由配置
route:
  group_by: ['instance', 'severity', 'alertname']
  group_wait: 15s
  group_interval: 5m
  repeat_interval: 24h
  receiver: 'web.hook.prometheusalert'
  routes:
    # 静默 info/none 级别告警
    - match:
        severity: 'info'
      receiver: 'null'
    - match:
        severity: 'none'
      receiver: 'null'

# 接收器配置
receivers:
  # 静默接收器
  - name: 'null'
  # 默认接收器 - 所有告警统一通过 PrometheusAlert 转发至飞书
  # fsurl 参数从 .env 中 PA_FEISHU_URL 获取，部署时按需修改
  - name: 'web.hook.prometheusalert'
    webhook_configs:
      - url: 'http://prometheus-alert:8080/prometheusalert?type=fs&tpl=prometheus-fs'
        send_resolved: true

# 告警抑制规则
# critical 级别告警抑制同源的 warning 级别告警
inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ['alertname', 'instance']
